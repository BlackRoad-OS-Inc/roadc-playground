name: CI
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Syntax check
        run: |
          find . -name '*.py' -type f | while read f; do
            echo "Checking $f"
            python -m py_compile "$f"
          done
      - name: Lint
        run: |
          pip install ruff
          ruff check . || true
      - name: Validate
        run: echo "✅ All checks passed"
